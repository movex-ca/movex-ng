<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movex Nigeria | Login</title>
    <meta name="description" content="Movex Nigeria secure login portal" />
    <link rel="icon" type="image/jpeg" href="assets/images/movex-logo.jpg" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fffde7, #fff9c4, #fef08a);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 430px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 22px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
            padding: 35px 28px;
            border: 1px solid rgba(255, 235, 59, 0.45);
        }

        .logo-box {
            text-align: center;
            margin-bottom: 16px;
        }

        .logo-box img {
            width: 95px;
            height: 95px;
            object-fit: contain;
            border-radius: 16px;
            background: #081a4b;
            padding: 8px;
            box-shadow: 0 8px 18px rgba(250, 204, 21, 0.35);
        }

        h2 {
            text-align: center;
            color: #4b5563;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 28px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }

        .input-box {
            position: relative;
        }

        .input-box input {
            width: 100%;
            padding: 14px 44px 14px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            background: #fffef7;
            transition: 0.3s ease;
        }

        .input-box input:focus {
            border-color: #eab308;
            box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.18);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            cursor: pointer;
            font-size: 18px;
            color: #6b7280;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4b5563;
            font-size: 14px;
        }

        .remember input {
            accent-color: #eab308;
        }

        a {
            color: #b45309;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #facc15, #fde047);
            color: #3f3f46;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 10px 20px rgba(250, 204, 21, 0.25);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .bottom-text {
            text-align: center;
            margin-top: 22px;
            color: #6b7280;
            font-size: 14px;
        }

        .terms {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #6b7280;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .card {
                padding: 28px 20px;
            }

            h2 {
                font-size: 24px;
            }

            .logo-box img {
                width: 84px;
                height: 84px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo-box">
                <img src="assets/images/movex-logo.jpg" alt="Movex Logo" />
            </div>

            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to your Movex Nigeria account</p>

            <form action="forms/auth/submit/login_submit.php" method="post">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-box">
                        <input type="email" id="email" name="login_identity" placeholder="Enter your email address" required />
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-box">
                        <input type="password" id="password" name="login_password" placeholder="Enter your password" required />
                        <button type="button" class="toggle-password" onclick="togglePassword('password', this)">👁</button>
                    </div>
                </div>

                <div class="row">
                    <label class="remember">
                        <input type="checkbox" name="remember_me" />
                        Remember me
                    </label>
                    <a href="forgot-password.php">Forgot Password?</a>
                </div>

                <button type="submit" class="btn">Login</button>

                <p class="bottom-text">
                    Do not have an account?
                    <a href="register.html">Register</a>
                </p>

                <div class="terms">
                    By continuing, you agree to our
                    <a href="terms.html">Terms &amp; Conditions</a>.
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePassword(fieldId, button) {
            const input = document.getElementById(fieldId);
            if (input.type === "password") {
                input.type = "text";
                button.textContent = "🙈";
            } else {
                input.type = "password";
                button.textContent = "👁";
            }
        }
    </script>
</body>
</html>
